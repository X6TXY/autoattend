# fly.toml app configuration file generated for autoattend on 2026-02-07T22:05:15+05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'autoattend'
primary_region = 'arn'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "5s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = '2gb'
  cpus = 1
  memory_mb = 2048
